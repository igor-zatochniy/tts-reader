name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Run Gitleaks action
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_ENABLE_COMMENTS: false

      - name: Scan full Git history for secrets
        run: gitleaks detect --source . --verbose

  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24

      - name: Check formatting
        shell: pwsh
        run: |
          $files = gofmt -l $(git ls-files '*.go')
          if ($files) {
            $files
            exit 1
          }

      - name: Validate OpenAPI
        run: npx --yes @redocly/cli@2.38.0 lint api/openapi.yaml

      - name: Verify modules
        run: go mod verify

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2025.1.1

      - name: Staticcheck
        run: staticcheck ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0

      - name: Govulncheck
        run: govulncheck ./...

      - name: Build
        run: go build ./...

  publish:
    needs: [verify, scan-secrets]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: false

      - name: Build Windows executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -ldflags "-s -w" -o dist/tts-reader-windows-amd64.exe .

      - name: Create SHA256 checksum
        shell: pwsh
        run: |
          $exe = "dist/tts-reader-windows-amd64.exe"
          $checksum = "dist/tts-reader-windows-amd64.exe.sha256"
          $hash = (Get-FileHash -Algorithm SHA256 $exe).Hash.ToLowerInvariant()
          "$hash  tts-reader-windows-amd64.exe" | Set-Content -Path $checksum -Encoding ascii -NoNewline

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $notes = @(
            "Windows amd64 build for Audiobook TTS Reader.",
            "",
            "Assets:",
            "- tts-reader-windows-amd64.exe",
            "- tts-reader-windows-amd64.exe.sha256"
          ) -join [Environment]::NewLine

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes $notes
          }

          gh release upload $tag `
            dist/tts-reader-windows-amd64.exe `
            dist/tts-reader-windows-amd64.exe.sha256 `
            --clobber
