name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check formatting
        shell: pwsh
        run: |
          $files = gofmt -l $(git ls-files '*.go')
          if ($files) {
            $files
            exit 1
          }

      - name: Validate OpenAPI
        run: npx --yes @redocly/cli@2.38.0 lint api/openapi.yaml

      - name: Verify modules
        run: go mod verify

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2025.1.1

      - name: Staticcheck
        run: staticcheck ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0

      - name: Govulncheck
        run: govulncheck ./...

      - name: Build
        run: go build ./...

  publish:
    needs: verify
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build Windows executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -ldflags "-s -w" -o dist/tts-reader-windows-amd64.exe .

      - name: Create SHA256 checksum
        shell: pwsh
        run: |
          $exe = "dist/tts-reader-windows-amd64.exe"
          $checksum = "dist/tts-reader-windows-amd64.exe.sha256"
          $hash = (Get-FileHash -Algorithm SHA256 $exe).Hash.ToLowerInvariant()
          "$hash  tts-reader-windows-amd64.exe" | Set-Content -Path $checksum -Encoding ascii -NoNewline

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $notes = @(
            "Windows amd64 build for Audiobook TTS Reader.",
            "",
            "Assets:",
            "- tts-reader-windows-amd64.exe",
            "- tts-reader-windows-amd64.exe.sha256"
          ) -join [Environment]::NewLine

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes $notes
          }

          gh release upload $tag `
            dist/tts-reader-windows-amd64.exe `
            dist/tts-reader-windows-amd64.exe.sha256 `
            --clobber
